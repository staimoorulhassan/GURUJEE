name: Build GURUJEE APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required for softprops/action-gh-release when using GITHUB_TOKEN
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            libltdl-dev cmake ninja-build

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer "cython<3.0" "sh>=1.10,<2.0"

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('launcher/buildozer.spec') }}-sdk34
          restore-keys: |
            buildozer-${{ runner.os }}-

      # Install Android cmdline-tools and create the legacy tools/bin/sdkmanager
      # symlink that buildozer expects. Google moved sdkmanager from tools/bin/
      # to cmdline-tools/latest/bin/ in SDK r26; buildozer still probes the old path.
      - name: Set up Android SDK (cmdline-tools + sdkmanager shim)
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          SDK="$ANDROID_SDK_ROOT"
          mkdir -p "$SDK"

          # Download cmdline-tools only if not already present (cache hit idempotency).
          if [ ! -f "$SDK/cmdline-tools/latest/bin/sdkmanager" ]; then
            wget -q \
              https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
              -O /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/clt
            # Empty the target before moving to avoid nested directories on re-runs.
            rm -rf "$SDK/cmdline-tools/latest"
            mkdir -p "$SDK/cmdline-tools/latest"
            mv /tmp/clt/cmdline-tools/* "$SDK/cmdline-tools/latest/"
          fi

          # Shim: always re-create so it is present even after a partial cache restore.
          mkdir -p "$SDK/tools/bin"
          ln -sf "$SDK/cmdline-tools/latest/bin/sdkmanager" "$SDK/tools/bin/sdkmanager"

          # Pre-seed license files so sdkmanager never prompts interactively
          mkdir -p "$SDK/licenses"
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > "$SDK/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > "$SDK/licenses/android-sdk-preview-license"
          printf '\n33b6ad264991c446f2f65a2b0e6ba94f5be58e98\n' \
            > "$SDK/licenses/android-googletv-license"

          # Pre-install the SDK components buildozer needs so it skips re-download
          "$SDK/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build APK (debug)
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          set -o pipefail
          cd launcher
          buildozer android debug 2>&1 | tee ../build.log
          echo "=== APK files found ==="
          find bin/ -name "*.apk" 2>/dev/null || echo "No APK in bin/ — check build.log"

      - name: Verify APK was produced
        run: |
          APK_COUNT=$(find launcher/bin/ -name "*.apk" 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APK found in launcher/bin/ — build failed."
            exit 1
          fi
          echo "APK(s) found: $(find launcher/bin/ -name '*.apk')"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: launcher/bin/*.apk
          name: GURUJEE ${{ github.ref_name }}
          body: |
            ## Install GURUJEE

            **Option A (Termux — recommended):**
            ```bash
            curl -sL https://raw.githubusercontent.com/staimoorulhassan/GURUJEE/main/install.sh | bash
            ```

            **Option B (APK):**
            1. Download `gurujee-*.apk` below
            2. Enable Unknown Sources in Android Settings
            3. Install the APK
            4. Open GURUJEE — guided setup runs automatically

            **Requirements:** Android 9+, 2GB RAM, internet for first setup
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN1 }}

      - name: Also upload APK as artifact (for non-tag builds)
        uses: actions/upload-artifact@v4
        with:
          name: gurujee-apk
          path: launcher/bin/*.apk
          if-no-files-found: warn
