# ================================================================
# GURUJEE Security Configuration
# Security-anchor hosts — always in the network allowlist
# regardless of which AI providers are configured.
# Referenced by gurujee/ai/client.py::_build_allowlist()
# This file is version-controlled. Contains NO secrets.
# IMPORTANT: Do NOT add AI provider endpoints here — those belong in models.yaml.
# ================================================================

network_allowlist:
  # These hosts are always permitted (never removed by provider changes).
  # AI provider hosts are derived dynamically from config/models.yaml base_url fields.
  security_anchors:
    - host: api.elevenlabs.io
      purpose: "Voice synthesis (TTS)"
      required_for: [voice, tts]
      phase: 1

    - host: sip.suii.us
      purpose: "SIP calling"
      required_for: [calls, sip]
      phase: 2

    - host: stun.l.google.com
      purpose: "STUN for SIP NAT traversal"
      required_for: [calls, sip]
      phase: 2

    - host: api.deepgram.com
      purpose: "Cloud STT (optional upgrade from Whisper tiny.en)"
      required_for: [stt_cloud]
      phase: 2
      optional: true

  # Policy for connection attempts to hosts not in the derived allowlist.
  # Options: block | prompt_user | allow_once
  unknown_host_policy: prompt_user

  # Log all allowlist build events and violations.
  log_blocked_requests: true
  log_file: data/security.log

  # User-approved one-off hosts (populated at runtime by PWA settings UI; stored in keystore).
  user_approved_hosts: []

# ================================================================
# Keystore policy (mirrors FR-019 / FR-023)
# ================================================================
keystore:
  path: data/gurujee.keystore
  algorithm: AES-256-GCM
  key_derivation: PBKDF2-HMAC-SHA256
  iterations: 260000          # reduced from 480k after ARM64 benchmarking
  salt_source: device_fingerprint

# ================================================================
# PIN lockout policy (mirrors FR-023)
# ================================================================
pin_policy:
  min_length: 4
  max_length: 8
  max_attempts: 3
  lockout_seconds: 30
  lockout_multiplier: 2       # doubles each failed lockout cycle
