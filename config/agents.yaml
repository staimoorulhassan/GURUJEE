heartbeat:
  ping_interval_seconds: 8      # 8s + 5s timeout = 13s worst-case detection
  response_timeout_seconds: 5
  max_restart_attempts: 10
  consecutive_miss_threshold: 2

memory:
  short_term_max_turns: 10
  long_term_max_results: 5
  backup_interval_days: 7

logging:
  max_bytes: 5242880
  backup_count: 3
